<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Applicaation Form</title>
  <link rel="stylesheet" href="../css/form.css">
</head>
<body>
  <div class="container">
    <div class="apply_box">
      <h1>Job Application <span class="small">(Web)</span></h1>

      <form action="">
        <div class="form_container">
          <div class="form_control">
            <label for="first">First Name</label>
            <input id="first" name="first_name" placeholder="Enter First Name....">
          </div>

          <div class="form_control">
            <label for="last">Last Name</label>
            <input id="last" name="last_name" placeholder="Enter Last Name....">
          </div>

          <div class="form_control">
            <label for="email">Enter Email</label>
            <input type="email" id="email" name="email_name" placeholder="Enter Your Email....">
          </div>
          
          
          <div class="form_control">
            <label for="job_role">Job Role</label>
            <select id="job_role" name="job_role">
              <option value="">Select Job Role</option>
              <option value="frontend">Frontend Developer</option>
              <option value="backend">Backend Developer</option>
              <option value="fullstack">FullStack Developer</option>
              <option value="ui ux">UI and UX Developer</option>
            </select>
          </div>
          
          <div class="textarea_control">
            <label for="address">Address</label>
            <textarea id="address" name="address" row="4" col="50" placeholder="Enter Address"></textarea>
          </div>
         
          <div class="form_control">
            <label for="city">City</label>
            <input id="city" name="city" placeholder="Enter City Name....">
          </div>

          <div class="form_control">
            <label for="pincode">Pincode</label>
            <input type="number" id="pincode" name="pincode" placeholder="Enter Pincode....">
          </div>

          <div class="form_control">
            <label for="date">Date</label>
            <input value= "2026-03-17" type="date" id="date" name="date">
          </div>

          <div class="form_control">
            <label for="upload">Upload</label>
            <input value= "upload" type="file" id="upload" name="upload">
          </div>

        </div>
        <div class="button_container">
          <button type="submit">Apply Now</button>
        </div>
        
      </form>
    </div>
  </div>

</body>
</html>
